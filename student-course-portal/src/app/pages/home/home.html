<h1>{{ portalName }}</h1>

<p>
  This portal allows students to browse courses, enroll in courses,
  view profiles, and check academic information.
</p>

<hr>

<h3>Portal Statistics</h3>

<p>Courses Available : 12</p>
<p>Enrolled : 3</p>
<p>GPA : 3.8</p>

<hr>

<button
  [disabled]="!isPortalActive"
  (click)="onEnrollClick()">

  Enroll Now

</button>

<p>{{ message }}</p>

<hr>

<h3>Search Courses</h3>

<input
  type="text"
  [(ngModel)]="searchTerm"
  placeholder="Search course">

<p>Searching for: {{ searchTerm }}</p>
