<p *ngIf="isLoading">
  Loading courses...
</p>

<div *ngIf="!isLoading; else noCourses">

  <app-course-card
      *ngFor="let course of courses; trackBy: trackByCourseId"
      [course]="course"
      (enrollRequested)="onEnroll($event)">
  </app-course-card>

</div>

<ng-template #noCourses>

  <p *ngIf="courses.length===0">
    No courses available.
  </p>

</ng-template>
